<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./CSS/bootstrap.css" />
    <style>
      .b {
        background: linear-gradient(blue, purple);
        background-size: no-repeat;
      }
    </style>
  </head>
  <body class="b h-100 p-1">
    <div class="mx-auto w-50 my-5 p-5 bg-light">
      <div class="text-center h3 my-5">Login Form</div>
      <div class="mb-3 mx-5 ps-5">
        <label for="exampleFormControlInput1" class="form-label">Email </label>
        <input
          type="email"
          class="form-control w-75"
          id="exampleFormControlInput1"
          placeholder="Email"
          required
        />
      </div>
      <div class="mb-3 mx-5 ps-5">
        <label for="exampleFormControlInput1" class="form-label"
          ><i class="fa-solid fa-key"></i> Password</label
        >
        <input
          type="Password"
          class="form-control w-75"
          id="exampleFormControlInput1"
          placeholder="***********"
          required
        />
      </div>
      <div class="mb-3 mx-5 ps-5">
        <button
          type="button"
          class="btn btn-warning w-75 rounded-pill text-white"
        >
          SUBMIT
        </button>
      </div>
    </div>
  </body>
</html>
